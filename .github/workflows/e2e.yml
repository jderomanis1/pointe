name: E2E

# S10.i — separate from the unit CI gate. Triggers:
#   • workflow_dispatch — manual prove-it run (the bring-up case + ad-hoc).
#   • pull_request to release-* — required check before any release lands.
#   • schedule (nightly) — catches drift between merges.
# Deliberately NOT on every push: multi-tab WS E2E is the flakiest test
# class in the project; gating per-commit would erode the trust-the-tests
# discipline. Per-push stays the unit suite (.github/workflows/ci.yml).
#
# Branch protection: mark the `e2e` check required on `release-*` branches
# via repo settings (cannot be expressed in this file alone).

on:
  workflow_dispatch: {}
  pull_request:
    branches: ['release-*']
  schedule:
    - cron: '37 7 * * *' # 07:37 UTC nightly (off-peak; misses hourly maintenance windows)

# E2E spins up a local stack; one run at a time per ref to avoid port
# collisions. Newer runs preempt older queued ones.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        # chromium-only for now; multi-browser is a cheap future expansion.
        run: pnpm test:e2e:install

      - name: Run E2E
        # Playwright's webServer config boots wrangler + vite and waits on
        # readiness via /api/health. No CI-side bash orchestration needed.
        run: pnpm test:e2e

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
