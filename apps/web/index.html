<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pointe</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!--
      S10.vii — Cloudflare Web Analytics beacon (cookieless, aggregate-only,
      no PII per Doc 2 §17). Documented snippet shape from
      https://developers.cloudflare.com/web-analytics/get-started/ —
      `beacon.min.js` is the cookieless variant; it does NOT set or read
      cookies, and reports aggregate visit/page-view counts to the CF
      dashboard. The token is the public beacon site identifier (it ships
      in page source) — NOT a secret, safe to commit. `data-cf-beacon` is
      an attribute (not inline script), so it needs no `unsafe-inline`.
    -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "840b76e2878748559a2461cc189d7e00"}'></script>
  </body>
</html>
